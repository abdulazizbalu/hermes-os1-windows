name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true

jobs:
  package-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem release -File | ForEach-Object {
            Get-FileHash $_.FullName -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash)  $([System.IO.Path]::GetFileName($_.Path))" } |
              Out-File -Encoding ascii -FilePath "$($_.FullName).sha256"
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Hermes OS1 Windows v${{ inputs.version }}
          draft: true
          files: |
            release/*
